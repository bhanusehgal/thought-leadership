name: ops-manual

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Command to run"
        required: true
        type: choice
        options:
          - run_weekly
          - run_topic
          - approve
          - publish
          - publish_approved
          - list_items
      topic:
        description: "Topic for run_topic"
        required: false
        default: ""
        type: string
      pillar:
        description: "Optional pillar override for run_topic"
        required: false
        default: ""
        type: string
      week_type:
        description: "Optional week-type override for run_topic"
        required: false
        default: ""
        type: string
      source_urls:
        description: "Optional comma-separated source URLs for run_topic"
        required: false
        default: ""
        type: string
      article_id:
        description: "Article ID for approve/publish"
        required: false
        default: ""
        type: string
      count:
        description: "Count for run_weekly"
        required: false
        default: "1"
        type: string
      state:
        description: "State filter for list_items"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Use dry run for publish commands"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      force_run:
        description: "Bypass schedule window for run_weekly"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      skip_url_check:
        description: "Skip live citation URL reachability checks"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  run-command:
    runs-on: ubuntu-latest
    env:
      EMAIL_CAPTURE_URL: ${{ secrets.EMAIL_CAPTURE_URL }}
      MEDIUM_SESSION_COOKIE: ${{ secrets.MEDIUM_SESSION_COOKIE }}
      MEDIUM_EMAIL: ${{ secrets.MEDIUM_EMAIL }}
      MEDIUM_PASSWORD: ${{ secrets.MEDIUM_PASSWORD }}
      MERCURY_PARSER_API_KEY: ${{ secrets.MERCURY_PARSER_API_KEY }}
      ENABLE_MEDIUM_PUBLISH: ${{ secrets.ENABLE_MEDIUM_PUBLISH }}
    steps:
      - uses: actions/checkout@v4
      - name: Restore persisted state
        uses: actions/cache@v4
        with:
          path: |
            artifacts
            approvals
            reviews
          key: medium-agent-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            medium-agent-state-${{ github.ref_name }}-
            medium-agent-state-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Install Playwright (publish commands only)
        if: ${{ inputs.command == 'publish' || inputs.command == 'publish_approved' }}
        run: python -m playwright install chromium
      - name: Initialize DB
        run: python -m agent.cli init-db
      - name: Run command
        shell: bash
        run: |
          mkdir -p artifacts/ops
          {
            echo "command=${{ inputs.command }}"
            echo "topic=${{ inputs.topic }}"
            echo "pillar=${{ inputs.pillar }}"
            echo "week_type=${{ inputs.week_type }}"
            echo "source_urls=${{ inputs.source_urls }}"
            echo "article_id=${{ inputs.article_id }}"
            echo "count=${{ inputs.count }}"
            echo "state=${{ inputs.state }}"
            echo "dry_run=${{ inputs.dry_run }}"
            echo "force_run=${{ inputs.force_run }}"
            echo "skip_url_check=${{ inputs.skip_url_check }}"
          } > artifacts/ops/request.txt

          set -e
          case "${{ inputs.command }}" in
            run_weekly)
              url_flag=""
              if [ "${{ inputs.skip_url_check }}" = "true" ]; then
                url_flag="--skip-url-check"
              fi
              if [ "${{ inputs.force_run }}" = "true" ]; then
                python -m agent.cli run-weekly --count "${{ inputs.count }}" $url_flag | tee artifacts/ops/command.log
              else
                python -m agent.cli run-weekly --count "${{ inputs.count }}" --respect-schedule $url_flag | tee artifacts/ops/command.log
              fi
              ;;
            run_topic)
              if [ -z "${{ inputs.topic }}" ]; then
                echo "topic is required for run_topic" >&2
                exit 1
              fi
              cmd=(python -m agent.cli run-topic --topic "${{ inputs.topic }}")
              if [ "${{ inputs.skip_url_check }}" = "true" ]; then
                cmd+=(--skip-url-check)
              fi
              if [ -n "${{ inputs.pillar }}" ]; then
                cmd+=(--pillar "${{ inputs.pillar }}")
              fi
              if [ -n "${{ inputs.week_type }}" ]; then
                cmd+=(--week-type "${{ inputs.week_type }}")
              fi
              if [ -n "${{ inputs.source_urls }}" ]; then
                IFS=',' read -ra URLS <<< "${{ inputs.source_urls }}"
                for u in "${URLS[@]}"; do
                  trimmed="$(echo "$u" | xargs)"
                  if [ -n "$trimmed" ]; then
                    cmd+=(--source-url "$trimmed")
                  fi
                done
              fi
              "${cmd[@]}" | tee artifacts/ops/command.log
              ;;
            approve)
              python -m agent.cli approve --id "${{ inputs.article_id }}" | tee artifacts/ops/command.log
              ;;
            publish)
              if [ "${ENABLE_MEDIUM_PUBLISH}" != "true" ]; then
                echo "Publishing is disabled. Set ENABLE_MEDIUM_PUBLISH=true to enable final Medium publish." | tee artifacts/ops/command.log
                exit 0
              fi
              if [ "${{ inputs.dry_run }}" = "true" ]; then
                python -m agent.cli publish --id "${{ inputs.article_id }}" --dry-run | tee artifacts/ops/command.log
              else
                python -m agent.cli publish --id "${{ inputs.article_id }}" | tee artifacts/ops/command.log
              fi
              ;;
            publish_approved)
              if [ "${ENABLE_MEDIUM_PUBLISH}" != "true" ]; then
                echo "Publishing is disabled. Set ENABLE_MEDIUM_PUBLISH=true to enable final Medium publish." | tee artifacts/ops/command.log
                exit 0
              fi
              if [ "${{ inputs.dry_run }}" = "true" ]; then
                python -m agent.cli publish-approved --dry-run | tee artifacts/ops/command.log
              else
                python -m agent.cli publish-approved | tee artifacts/ops/command.log
              fi
              ;;
            list_items)
              if [ -n "${{ inputs.state }}" ]; then
                python -m agent.cli list-items --state "${{ inputs.state }}" | tee artifacts/ops/list_items.json
              else
                python -m agent.cli list-items | tee artifacts/ops/list_items.json
              fi
              ;;
            *)
              echo "Unsupported command: ${{ inputs.command }}" >&2
              exit 1
              ;;
          esac
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-manual-${{ github.run_number }}
          path: |
            artifacts/**
            approvals/**
            reviews/**
