<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medium Authority Engine Console</title>
  <style>
    :root {
      --bg: #f7fafc;
      --panel: #ffffff;
      --ink: #0f172a;
      --sub: #475569;
      --brand: #0d9488;
      --brand-2: #155e75;
      --ok: #166534;
      --bad: #991b1b;
      --border: #dbe2ea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top right, #dbeafe, var(--bg) 40%);
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }
    .hero {
      margin-bottom: 16px;
    }
    .hero h1 {
      margin: 0 0 6px;
      font-size: 1.5rem;
    }
    .hero p {
      margin: 0;
      color: var(--sub);
      font-size: 0.98rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 7px 24px rgba(15, 23, 42, 0.08);
    }
    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: var(--brand-2);
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: var(--sub);
    }
    input, select {
      width: 100%;
      margin-top: 4px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }
    button {
      border: 0;
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
      color: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .status {
      margin-top: 12px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 10px;
      min-height: 56px;
      font-family: Consolas, monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
    }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .runs {
      margin-top: 8px;
      max-height: 300px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
    }
    .run {
      padding: 8px 6px;
      border-bottom: 1px dashed #dbe2ea;
      font-size: 0.85rem;
    }
    .run:last-child {
      border-bottom: 0;
    }
    .run a {
      color: var(--brand-2);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Medium Authority Engine</h1>
      <p>Mobile control panel for GitHub Actions powered operations.</p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>Trigger Operation</h2>
        <label>
          Command
          <select id="command">
            <option value="run_weekly">run_weekly</option>
            <option value="run_topic">run_topic</option>
            <option value="approve">approve</option>
            <option value="publish">publish</option>
            <option value="publish_approved">publish_approved</option>
            <option value="list_items">list_items</option>
          </select>
        </label>
        <label>
          Topic (required for run_topic)
          <input id="topic" type="text" placeholder="How AML alerts can surface liquidity stress early" />
        </label>
        <div class="row">
          <label>
            Pillar (optional)
            <input id="pillar" type="text" placeholder="AML + AI" />
          </label>
          <label>
            Week type (optional)
            <input id="weekType" type="text" placeholder="Explainer (sharp + clear)" />
          </label>
        </div>
        <label>
          Source URLs (optional, comma-separated)
          <input id="sourceUrls" type="text" placeholder="https://federalreserve.gov/..., https://bis.org/..." />
        </label>
        <label>
          Article ID (required for approve/publish)
          <input id="articleId" type="text" placeholder="20260222-a001a167" />
        </label>
        <label>
          Dashboard key (optional, if NETLIFY_DASHBOARD_KEY is set)
          <input id="dashboardKey" type="password" placeholder="enter key" />
        </label>
        <div class="row">
          <label>
            Count (run_weekly)
            <input id="count" type="number" min="1" value="1" />
          </label>
          <label>
            State filter (list_items)
            <input id="state" type="text" placeholder="READY_FOR_REVIEW" />
          </label>
        </div>
        <div class="row">
          <label>
            Dry run
            <select id="dryRun">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </label>
          <label>
            Skip URL checks
            <select id="skipUrlCheck">
              <option value="false">false</option>
              <option value="true">true</option>
            </select>
          </label>
        </div>
        <div class="row">
          <label>
            Force schedule bypass (run_weekly)
            <select id="forceRun">
              <option value="false">false</option>
              <option value="true">true</option>
            </select>
          </label>
        </div>
        <button id="triggerBtn">Dispatch Workflow</button>
        <div class="status" id="statusBox">Idle.</div>
      </article>

      <article class="card">
        <h2>Recent Ops Runs</h2>
        <div class="row">
          <button class="secondary" id="refreshBtn">Refresh Runs</button>
          <button class="secondary" id="openActionsBtn">Open Actions</button>
        </div>
        <div class="runs" id="runsBox"></div>
      </article>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
